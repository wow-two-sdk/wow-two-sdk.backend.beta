name: publish

# Beta-forever: every push to main bumps the version, packs, publishes to nuget.org,
# then commits the bumped version back (so the repo always reflects what's published).
#
# Version is the source of truth in src/Directory.Build.props — format 10.{y}.{z}-beta:
#   x = 10     → .NET line (fixed)
#   z          → bumps each release; rolls to 0 (and y += 1) when it passes 99
#   -beta      → prerelease label (the mono-lib pulls prerelease deps → NU5104 on a stable id)
#
# The bump commit carries [skip ci] so it never re-triggers this workflow (no publish loop).

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write          # commit the version bump back to main
  id-token: write          # mint the OIDC token for NuGet Trusted Publishing

concurrency:
  group: publish
  cancel-in-progress: false  # never cancel a half-finished publish

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Bump version (10.y.z-beta)
        id: bump
        run: |
          PROPS=src/Directory.Build.props
          CUR=$(grep -oP '(?<=<Version>)[^<]+' "$PROPS" | head -1)
          CORE=${CUR%-beta}
          IFS=. read -r _ Y Z <<< "$CORE"
          Z=$((10#$Z + 1))
          if [ "$Z" -ge 100 ]; then Z=0; Y=$((10#$Y + 1)); fi
          VERSION="10.$Y.$Z-beta"
          FILEVERSION="10.$Y.$Z"
          sed -i "s|<Version>[^<]*</Version>|<Version>$VERSION</Version>|" "$PROPS"
          sed -i "s|<FileVersion>[^<]*</FileVersion>|<FileVersion>$FILEVERSION</FileVersion>|" "$PROPS"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "::notice::Releasing $VERSION (was $CUR)"

      - name: Pack         # version comes from Directory.Build.props (just bumped)
        run: dotnet pack src/WoW.Two.Sdk.Backend.Beta.csproj -c Release -p:ContinuousIntegrationBuild=true -o artifacts

      - name: Authenticate to NuGet (Trusted Publishing)   # OIDC → short-lived API key, no stored secret
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: MaxDev   # nuget.org username — VERIFY input name/value against the TP "Learn more" docs

      - name: Push to nuget.org   # the adjacent .snupkg is pushed automatically
        run: dotnet nuget push "artifacts/*.nupkg" -s https://api.nuget.org/v3/index.json -k ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --skip-duplicate

      - name: Commit + tag the bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/Directory.Build.props
          git commit -m "chore: release ${{ steps.bump.outputs.version }} [skip ci]"
          git tag "v${{ steps.bump.outputs.version }}"
          git push --follow-tags
